<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app">
      <style>
        .loading-mask {
          /* background-color: rgba(255, 255, 255, 0.9); */
          background: #F2F3F5;
          bottom: 0px;
          box-sizing: border-box;
          color: rgb(48, 49, 51);
          color-scheme: light;
          display: block;
          height: 100vh;
          left:0px;
          margin-bottom:0px;
          margin-left: 0px;
          margin-right: 0px;
          margin-top: 0px;
          position: fixed;
          right: 0px;
          top: 0px;
          transition-behavior: normal;
          transition-delay: 0s;
          transition-duration: 0.3s;
          transition-property: opacity;
          transition-timing-function: ease;
          width: 100vw;
          -webkit-font-smoothing: antialiased;
          -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        .loading-spinner {
          box-sizing: border-box;
          color: rgb(48, 49, 51);
          color-scheme: light;
          display: block;
          font-size: 14px;
          font-weight: 400;
          height: 53px;
          margin-top: -25px;
          position: absolute;
          text-align: center;
          top: 50%;
          width: 100%;
          -webkit-font-smoothing: antialiased;
          -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        .circular {
          animation-delay: 0s;
          animation-direction: normal;
          animation-duration: 2s;
          animation-fill-mode: none;
          animation-iteration-count: infinite;
          animation-name: loading-rotate;
          animation-play-state: running;
          animation-range-end: normal;
          animation-range-start: normal;
          animation-timeline: auto;
          animation-timing-function: linear;
          box-sizing: border-box;
          color: rgb(48, 49, 51);
          color-scheme: light;
          display: inline;
          height: 50px;
          overflow-clip-margin: content-box;
          overflow: hidden;
          text-align: center;
          width: 50px;
          -webkit-font-smoothing: antialiased;
          -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        .circular-path {
          animation-delay: 0s;
          animation-direction: normal;
          animation-duration: 1.5s;
          animation-fill-mode: none;
          animation-iteration-count: infinite;
          animation-name: loading-dash;
          animation-play-state: running;
          animation-range-end: normal;
          animation-range-start: normal;
          animation-timeline: auto;
          animation-timing-function: ease-in-out;
          box-sizing: border-box;
          color: rgb(48, 49, 51);
          color-scheme: light;
          cx: 25px;
          cy: 25px;
          display: inline;
          fill: none;
          height: auto;
          r: 20px;
          stroke: rgb(64, 158, 255);
          stroke-dasharray: 90px, 150px;
          stroke-dashoffset: -117.674px;
          stroke-linecap: round;
          stroke-width: 2px;
          text-align: center;
          transform-origin: 0px 0px;
          width: auto;
          -webkit-font-smoothing: antialiased;
          -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        @keyframes loading-rotate {
          100% {
            transform:rotate(360deg)
          }
        }
        @keyframes loading-dash {
          0% {
            stroke-dasharray:1,200;stroke-dashoffset:0
          }
          50% {
            stroke-dasharray:90,150;stroke-dashoffset:-40px
          }
          100% {
            stroke-dasharray:90,150;stroke-dashoffset:-120px
          }
        }
      </style>
      <div class="loading-mask">
        <div class="loading-spinner">
          <svg class="circular" viewBox="0 0 50 50">
            <circle class="circular-path" cx="25" cy="25" r="20" fill="none"></circle>
          </svg>
        </div>
      </div>
    </div>
    <!-- built files will be auto injected -->
  </body>
</html>
